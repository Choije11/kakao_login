<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="login-card">
    <h2>회원가입</h2>
    <p>정보를 입력하여 회원가입을 완료하세요.</p>

    <form style="display: flex; flex-direction: column; gap: 12px; text-align: left;">
        <label style="font-size: 14px; font-weight: bold; color: #333;">아이디</label>
        <input type="text" placeholder="아이디를 입력하세요" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">

        <label style="font-size: 14px; font-weight: bold; color: #333;">비밀번호</label>
        <input type="password" placeholder="비밀번호를 입력하세요" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">

        <label style="font-size: 14px; font-weight: bold; color: #333;">이름</label>
        <input type="text" placeholder="이름을 입력하세요" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">

        <button type="button" onclick="alert('테스트용 회원가입이 완료되었습니다!')" style="background-color: #333; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;">가입하기</button>
    </form>

    <a th:href="@{/}" style="display: inline-block; margin-top: 20px; color: #666; font-size: 14px; text-decoration: none;">이전으로 돌아가기</a>
</div>

</body>
</html>
