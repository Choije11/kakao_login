<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카카오 로그인 테스트</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="login-card">
    <div th:if="${!isLoggedIn}">
        <h2>반갑습니다!</h2>
        <p>서비스를 이용하려면 로그인해 주세요.</p>
<!--REST API 만드는방법참고:https://funfunweb.tistory.com/entry/%EC%B9%B4%EC%B9%B4%EC%98%A4-%EB%94%94%EB%B2%A8%EB%A1%9C%ED%8D%BC%EC%8A%A4-%EC%95%B1-%EB%A7%8C%EB%93%A4%EA%B8%B0-rest-api-%ED%82%A4-%EB%A7%8C%EB%93%A4%EA%B8%B0)-->
        <a href="https://kauth.kakao.com/oauth/authorize?client_id=본인키넣어요&redirect_uri=http://localhost:8080/auth/kakao/callback&response_type=code" class="kakao-login-btn">
            <svg class="kakao-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path fill="#000000" d="M12 3c-5.52 0-10 3.48-10 7.78 0 2.82 2.06 5.28 5.17 6.64-.2.72-.74 2.62-.85 3.03-.14.53.19.52.4.38.17-.11 2.76-1.87 3.86-2.63.46.06.94.1 1.42.1 5.52 0 10-3.48 10-7.78S17.52 3 12 3z"/>
            </svg>
            카카오 계정으로 로그인
        </a>

        <a th:href="@{/signup}" class="signup-link">아직 계정이 없으신가요? 회원가입</a>
    </div>

    <div th:if="${isLoggedIn}">
        <h2>🎉 로그인 성공!</h2>
        <p><strong th:text="${nickname}" style="color: #0066cc;"></strong>님, 환영합니다.</p>

        <a th:href="@{/logout}" class="logout-btn">로그아웃</a>
    </div>
</div>

</body>
</html>
